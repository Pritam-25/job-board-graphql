enum JobType {
  FULL_TIME
  PART_TIME
  INTERNSHIP
}

type Job {
  id: String!
  title: String!
  description: String!
  location: String!
  company: Company!
  companyId: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
  owner: User!
  ownerId: String!
  applicants: [User!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SerchJobsInput {
  query: String!
}

type Query {
  searchJobs(input: SerchJobsInput!): [Job!]!
}

input CreateJobInput {
  title: String!
  description: String!
  location: String!
  companyId: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
}

input DeleteJobInput {
  jobId: String!
}

input ApplyToJobInput {
  jobId: String!
}

input CancelApplicationInput {
  jobId: String!
}

type Mutation {
  createJob(input: CreateJobInput!): Job!
  deleteJob(input: DeleteJobInput!): Boolean!
  applyToJob(input: ApplyToJobInput!): Boolean!
  cancelApplication(input: CancelApplicationInput!): Boolean!
}

extend type Query {
  jobs: [Job!]
}
