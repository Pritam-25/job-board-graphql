enum JobType {
  FULL_TIME
  PART_TIME
  INTERNSHIP
}

type Job {
  id: String!
  title: String!
  description: String!
  location: String!
  company: Company!
  companyId: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
  owner: User!
  ownerId: String!
  applicants: [User!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

extend type Query {
  jobs: [Job!]
}
