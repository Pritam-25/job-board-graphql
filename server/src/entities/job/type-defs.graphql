enum JobType {
  FULL_TIME
  PART_TIME
  INTERNSHIP
}

type Job {
  id: String!
  title: String!
  description: String!
  location: String!
  company: Company!
  companyId: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
  owner: User!
  ownerId: String!
  applicants: [User!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input SearchJobsInput {
  query: String!
}

type Query {
  searchJobs(input: SearchJobsInput!): [Job!]!
}

input CreateJobInput {
  title: String!
  description: String!
  location: String!
  companyName: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
}

input UpdateJobInput {
  id: String!
  title: String
  description: String
  location: String
  companyName: String
  type: JobType
  remote: Boolean
  salary: Int
}

input DeleteJobInput {
  id: String!
}

input ApplyToJobInput {
  id: String!
}

input CancelApplicationInput {
  id: String!
}

type Mutation {
  createJob(input: CreateJobInput!): Job!
  updateJob(input: UpdateJobInput!): Job!
  deleteJob(input: DeleteJobInput!): Boolean!
  applyToJob(input: ApplyToJobInput!): Boolean!
  cancelApplication(input: CancelApplicationInput!): Boolean!
}

extend type Query {
  jobs: [Job!]
}
